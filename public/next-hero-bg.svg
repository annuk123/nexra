<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200">
  <defs>
    <!-- Big grid pattern -->
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M200 0H0V200" fill="none" stroke="white" stroke-opacity="0.03"/>
    </pattern>

    <!-- Dotted pattern -->
    <pattern id="dots" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="white" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Grid layer -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Dot layer -->
  <rect width="100%" height="100%" fill="url(#dots)" />

  <!-- Blueprint arcs -->
  <circle cx="200" cy="200" r="160" stroke="white" stroke-opacity="0.05" stroke-dasharray="4 8" fill="none"/>
  <circle cx="1000" cy="900" r="260" stroke="white" stroke-opacity="0.04" stroke-dasharray="4 8" fill="none"/>
</svg>
